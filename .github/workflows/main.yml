name: Deploy API to Plesk via FTP

on:
  push:
    branches: [ master ]
  pull_request:
    types: [closed]
    branches: [ master ]

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Publish ERDM.Credit.API with Production config
      run: |
        dotnet publish ERDM.Credit.API/ERDM.Credit.API.csproj \
        --configuration Release \
        --output ./publish/api \
        -p:EnvironmentName=Production

    - name: Remove logs directory from publish (local only)
      run: |
        if (Test-Path "./publish/api/logs") {
          Remove-Item -Path "./publish/api/logs" -Recurse -Force
          Write-Host "Removed logs directory from local publish output"
        }

    - name: Deploy API to Server via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.0
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./publish/api/
        server-dir: ${{ secrets.FTP_API_PATH }}/
        exclude: |
          **/logs/**
          **/*.log
